services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - config_data:/var/www/html/.persistent
      - upload_data:/var/www/html/upload
      - logs_data:/var/www/html/logs
      - backups_data:/var/www/html/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-evocms}
      MYSQL_USER: ${MYSQL_USER:-evocms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-evocmspassword}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  config_data:
  upload_data:
  logs_data:
  backups_data:
  db_data:
